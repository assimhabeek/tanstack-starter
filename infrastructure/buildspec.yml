version: 0.2

phases:
  install:
    commands:
      - echo "Installing dependencies..."
  pre_build:
    commands:
      - echo "Checking the environment..."
  build:
  commands:
    - echo "Build is running on branch..."
    - git branch --show-current || echo "Not a git repo, checking env vars"
    - echo "CODEBUILD_SOURCE_VERSION is $CODEBUILD_SOURCE_VERSION"
  post_build:
    commands:
      - echo "Build completed successfully!"
      
artifacts:
  files:
    - '**/*'