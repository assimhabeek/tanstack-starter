version: 0.2

batch:
  fast-fail: false 
  build-list:
    - identifier: Lint
      buildspec: infrastructure/lint.yml

    - identifier: Test
      buildspec: infrastructure/test.yml

    - identifier: Build
      buildspec: infrastructure/build.yml

# Even if empty, some Batch versions require the phases tag 
# to acknowledge the 'Standard' container wrapper.
phases:
