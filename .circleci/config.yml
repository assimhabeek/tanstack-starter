version: 2.1

orbs:
  node: circleci/node@5.2
  aws-ecr: circleci/aws-ecr@9.8.1
  aws-cli: circleci/aws-cli@5.4.1
  terraform: circleci/terraform@3.7.0

# -----------------------------
# Reusable commands
# -----------------------------
commands:
  setup-pnpm:
    description: "Install and configure pnpm"
    steps:
      - run:
          name: Install pnpm Package Manager
          command: |
            npm install --global corepack@latest
            corepack enable
            corepack prepare pnpm@latest-10 --activate
            pnpm config set store-dir .pnpm-store

  install-deps:
    description: "Restore pnpm cache, install dependencies, and save cache"
    steps:
      - restore_cache:
          keys:
            - pnpm-packages-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-packages-
      - setup-pnpm
      - run:
          name: Install Dependencies
          command: pnpm install --frozen-lockfile --prefer-offline
      - save_cache:
          key: pnpm-packages-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - .pnpm-store

# -----------------------------
# Jobs
# -----------------------------
jobs:
  lint:
    docker:
      - image: cimg/node:22.14.0
    steps:
      - checkout
      - install-deps
      - run: pnpm biome ci .

  test:
    docker:
      - image: cimg/node:22.14.0
    steps:
      - checkout
      - install-deps
      - run:
          name: Test App
          working_directory: app
          command: pnpm test

  typecheck:
    docker:
      - image: cimg/node:22.14.0
    steps:
      - checkout
      - install-deps
      - run:
          name: Typecheck App
          working_directory: app
          command: pnpm tsc --noEmit

  build:
    docker:
      - image: cimg/node:22.14.0
    steps:
      - checkout
      - install-deps
      - run:
          name: Build App
          working_directory: app
          command: pnpm build
      - persist_to_workspace:
          root: .
          paths:
            - app/.output
            - Dockerfile

parameters:
  tf_path:
    type: string
    default: "./infrastructure/temp"
# -----------------------------
# Workflows
# -----------------------------
workflows:
  ci-cd:
    jobs:
      # # Parallel CI jobs
      # - lint
      # - test
      # - typecheck
      # - build

      # # Build and push Docker image
      # - aws-ecr/build_and_push_image:
      #     name: dockerize
      #     auth:
      #       - aws-cli/setup:
      #           region: ${AWS_REGION}
      #     checkout: false
      #     region: ${AWS_REGION}
      #     repo: ${APP_NAME}
      #     create_repo: true 
      #     tag: "latest,${CIRCLE_SHA1}"
      #     dockerfile: Dockerfile
      #     path: .
      #     attach_workspace: true
      #     workspace_root: .
      #     context: aws-credentials
      #     requires:
      #       - lint
      #       - test
      #       - typecheck
      #       - build
      # Terraform plan
      - terraform/fmt:
          checkout: true
          context:
            - terraform
            - aws-credentials
          tag: 1.14.8 # terraform version 
          path: << pipeline.parameters.tf_path >>
      - terraform/validate:
          checkout: true
          tag: 1.14.8 # terraform version 
          path: << pipeline.parameters.tf_path >>
          context:
            - terraform
            - aws-credentials
          requires:
            - terraform/fmt
      - terraform/plan:
          checkout: true
          tag: 1.14.8 # terraform version 
          persist-workspace: true
          path: << pipeline.parameters.tf_path >>
          pre-steps:
            - run: 
                name: Inject SHA
                command: echo 'export TF_VAR_container_image_tag=${CIRCLE_SHA1}' >> $BASH_ENV
          context:
            - terraform
            - aws-credentials
          requires:
            - terraform/validate

      # Manual approval before apply
      - hold:
          type: approval
          requires:
            - terraform/plan

      - terraform/apply:
          attach-workspace: true
          tag: 1.14.8 # terraform version 
          path: << pipeline.parameters.tf_path >>
          context:
            - terraform
            - aws-credentials
          requires:
            - hold

      # Terraform destroy (manual)
      # - hold-destroy:
      #     type: approval
      #     requires:
      #       - terraform-apply
      # - terraform-destroy:
      #     context: terraform
      #     requires:
      #       - hold-destroy