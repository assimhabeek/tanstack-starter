version: 2.1

orbs:
  node: circleci/node@5.2

# -----------------------------
# Reusable commands
# -----------------------------
commands:
  setup-pnpm:
    description: "Install and configure pnpm"
    steps:
      - run:
          name: Install pnpm Package Manager
          command: |
            npm install --global corepack@latest
            corepack enable
            corepack prepare pnpm@latest-10 --activate
            pnpm config set store-dir .pnpm-store

  install-deps:
    description: "Restore pnpm cache, install dependencies, and save cache"
    steps:
      - restore_cache:
          keys:
            - pnpm-packages-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-packages-
      - setup-pnpm
      - run:
          name: Install Dependencies
          command: pnpm install --frozen-lockfile --prefer-offline
      - save_cache:
          key: pnpm-packages-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - .pnpm-store

# -----------------------------
# Jobs
# -----------------------------
jobs:
  lint:
    docker:
      - image: cimg/node:22.14.0
    steps:
      - checkout
      - install-deps
      - run: pnpm biome ci .

  test:
    docker:
      - image: cimg/node:22.14.0
    steps:
      - checkout
      - install-deps
      - run:
          name: Test App
          working_directory: app
          command: pnpm test

  typecheck:
    docker:
      - image: cimg/node:22.14.0
    steps:
      - checkout
      - install-deps
      - run:
          name: Typecheck App
          working_directory: app
          command: pnpm tsc --noEmit

  build:
    docker:
      - image: cimg/node:22.14.0
    steps:
      - checkout
      - install-deps
      - run:
          name: Build App
          working_directory: app
          command: pnpm build

  # 🚀 New: Build Docker and push to ECR
  deploy-docker:
    machine:
      image: ubuntu-2204:current
    steps:
      - checkout
      - run:
          name: Build and Push to ECR
          command: |
            # Variables matching your script
            ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
            ECR_URL="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${APP_NAME}"
            COMMIT_HASH=${CIRCLE_SHA1}

            echo "🔐 Logging into ECR..."
            aws ecr get-login-password --AWS_REGION $AWS_REGION | docker login --username AWS --password-stdin $ECR_URL

            echo "🏗️ Building Docker image..."
            docker build -t $APP_NAME .

            echo "🏷️ Tagging image with latest and commit hash..."
            docker tag $APP_NAME:latest $ECR_URL:latest
            docker tag $APP_NAME:latest $ECR_URL:$COMMIT_HASH

            echo "🚀 Pushing to ECR..."
            docker push $ECR_URL:latest
            docker push $ECR_URL:$COMMIT_HASH

  # 🌍 New: Terraform Apply
  deploy-infra:
    docker:
      - image: hashicorp/terraform:latest
    steps:
      - checkout
      - run:
          name: Terraform Apply
          command: |
            # Navigate to your terraform folder if applicable
            # cd infrastructure/terraform 
            terraform init
            terraform apply -var="container_image_tag=${CIRCLE_SHA1}" -auto-approve

# -----------------------------
# Workflows
# -----------------------------
workflows:
  quality-gate-and-deploy:
    jobs:
      # These 4 run in parallel on every push
      - lint
      - test
      - typecheck
      - build

      # Only runs on 'main' and only if all the above pass
      - deploy-docker:
          context: aws-credentials # ⚠️ Set this context in CircleCI for AWS keys
          requires:
            - lint
            - test
            - typecheck
            - build
          filters:
            branches:
              only: main

      # Only runs after the Docker image is successfully pushed
      - deploy-infra:
          context: aws-credentials
          requires:
            - deploy-docker
          filters:
            branches:
              only: main