version: 2.1

orbs:
  node: circleci/node@5.2
  aws-ecr: circleci/aws-ecr@9.8.1
  aws-cli: circleci/aws-cli@5.4.1
  terraform: circleci/terraform@3.7.0

# -----------------------------
# Reusable commands
# -----------------------------
commands:
  setup-pnpm:
    description: "Install and configure pnpm"
    steps:
      - run:
          name: Install pnpm Package Manager
          command: |
            npm install --global corepack@latest
            corepack enable
            corepack prepare pnpm@latest-10 --activate
            pnpm config set store-dir .pnpm-store

  install-deps:
    description: "Restore pnpm cache, install dependencies, and save cache"
    steps:
      - restore_cache:
          keys:
            - pnpm-packages-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-packages-
      - setup-pnpm
      - run:
          name: Install Dependencies
          command: pnpm install --frozen-lockfile --prefer-offline
      - save_cache:
          key: pnpm-packages-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - .pnpm-store

# -----------------------------
# Jobs
# -----------------------------
jobs:
  lint:
    docker:
      - image: cimg/node:22.14.0
    steps:
      - checkout
      - install-deps
      - run: pnpm biome ci .

  test:
    docker:
      - image: cimg/node:22.14.0
    steps:
      - checkout
      - install-deps
      - run:
          name: Test App
          working_directory: app
          command: pnpm test

  typecheck:
    docker:
      - image: cimg/node:22.14.0
    steps:
      - checkout
      - install-deps
      - run:
          name: Typecheck App
          working_directory: app
          command: pnpm tsc --noEmit

  build:
    docker:
      - image: cimg/node:22.14.0
    steps:
      - checkout
      - install-deps
      - run:
          name: Build App
          working_directory: app
          command: pnpm build
      - persist_to_workspace:
          root: .
          paths:
            - app/.output
            - Dockerfile

  terraform-plan:
    executor: terraform/default
    steps:
      - checkout
      - run:
          name: Debug env vars
          command: |
            echo "TF_WORKSPACE=$TF_WORKSPACE"
            echo "TF_CLOUD_ORGANIZATION=$TF_CLOUD_ORGANIZATION"
      - terraform/init:
          path: infrastructure/terraform
      - terraform/validate:
          path: infrastructure/terraform
      - terraform/fmt:
          path: infrastructure/terraform
      - terraform/plan:
          path: infrastructure/terraform
          out: plan.tfplan
      - persist_to_workspace:
          root: .
          paths:
            - infrastructure/terraform/plan.tfplan

  terraform-apply:
    executor: terraform/default
    steps:
      - attach_workspace:
          at: .
      - terraform/apply:
          path: infrastructure/terraform
          plan: infrastructure/terraform/plan.tfplan

  terraform-destroy:
    executor: terraform/default
    steps:
      - attach_workspace:
          at: .
      - terraform/destroy:
          path: infrastructure/terraform
# -----------------------------
# Workflows
# -----------------------------
workflows:
  ci-cd:
    jobs:
      # # Parallel CI jobs
      # - lint
      # - test
      # - typecheck
      # - build

      # # Build and push Docker image
      # - aws-ecr/build_and_push_image:
      #     name: dockerize
      #     auth:
      #       - aws-cli/setup:
      #           region: ${AWS_REGION}
      #     checkout: false
      #     region: ${AWS_REGION}
      #     repo: ${APP_NAME}
      #     create_repo: true 
      #     tag: "latest,${CIRCLE_SHA1}"
      #     dockerfile: Dockerfile
      #     path: .
      #     attach_workspace: true
      #     workspace_root: .
      #     context: aws-credentials
      #     requires:
      #       - lint
      #       - test
      #       - typecheck
      #       - build
      # Terraform plan
      - terraform-plan:
          context: terraform
          # requires:
          #   - dockerize
      # Manual approval before apply
      - hold:
          type: approval
          requires:
            - terraform-plan
      # Terraform apply
      - terraform-apply:
          context: terraform
          requires:
            - hold
      # Terraform destroy (manual)
      - hold-destroy:
          type: approval
          requires:
            - terraform-apply
      - terraform-destroy:
          context: terraform
          requires:
            - hold-destroy