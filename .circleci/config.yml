version: 2.1

orbs:
  node: circleci/node@5.2
  aws-ecr: circleci/aws-ecr@9.8.1
  aws-cli: circleci/aws-cli@5.4.1


# -----------------------------
# Reusable commands
# -----------------------------
commands:
  setup-pnpm:
    description: "Install and configure pnpm"
    steps:
      - run:
          name: Install pnpm Package Manager
          command: |
            npm install --global corepack@latest
            corepack enable
            corepack prepare pnpm@latest-10 --activate
            pnpm config set store-dir .pnpm-store

  install-deps:
    description: "Restore pnpm cache, install dependencies, and save cache"
    steps:
      - restore_cache:
          keys:
            - pnpm-packages-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-packages-
      - setup-pnpm
      - run:
          name: Install Dependencies
          command: pnpm install --frozen-lockfile --prefer-offline
      - save_cache:
          key: pnpm-packages-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - .pnpm-store

# -----------------------------
# Jobs
# -----------------------------
jobs:
  lint:
    docker:
      - image: cimg/node:22.14.0
    steps:
      - checkout
      - install-deps
      - run: pnpm biome ci .

  test:
    docker:
      - image: cimg/node:22.14.0
    steps:
      - checkout
      - install-deps
      - run:
          name: Test App
          working_directory: app
          command: pnpm test

  typecheck:
    docker:
      - image: cimg/node:22.14.0
    steps:
      - checkout
      - install-deps
      - run:
          name: Typecheck App
          working_directory: app
          command: pnpm tsc --noEmit

  build:
    docker:
      - image: cimg/node:22.14.0
    steps:
      - checkout
      - install-deps
      # values will be baked into the build files
      - run:
          name: Generate production environment variables file (browser only)
          command: pnpm generate-prod-env
      - run:
          name: Build App
          working_directory: app
          command: pnpm build
      - persist_to_workspace:
          root: .
          paths:
            - app/.output
            - Dockerfile

  deploy:
    docker:
      - image: hashicorp/terraform:1.14.8
    # Set the working directory once to avoid 'cd' in every step
    working_directory: /tmp/workspace/infrastructure/terraform

    steps:
      - checkout:
          path: /tmp/workspace  # Need to checkout to the root
      - run:
          name: Terraform Init & Format
          command: |
            terraform fmt -check
            terraform init -input=false

      - run:
          name: Terraform Validate & Plan
          command: |
            terraform validate
            # update container image tag to the current commit
            terraform plan -var="container_image_tag=${CIRCLE_SHA1:0:7}" -out=tfplan
      - run:
          name: Terraform Apply
          command: terraform apply -auto-approve tfplan            
  
  provision:
    # Even with this, we still use source $BASH_ENV explicitly because it is more reliable across different Docker images.
    docker:
      - image: hashicorp/terraform:1.14.8

    steps:
      - checkout

      - run:
          name: Install AWS CLI & Bash
          command: apk add --no-cache aws-cli bash     

      - run:
          name: Fetch Current Production Tag
          working_directory: scripts
          command: |
            chmod +x fetch_prod_tag.sh
            ./fetch_prod_tag.sh

      - run:
          name: Terraform Init & Format
          working_directory: infrastructure/terraform
          command: |
            terraform fmt -check
            terraform init -input=false

      - run:
          name: Terraform Validate & Plan
          working_directory: infrastructure/terraform
          # keep the current prod image, we don't want to change app code before database migration
          command: |
            terraform validate
            source $BASH_ENV
            terraform plan -var="container_image_tag=${CURRENT_PROD_IMAGE_TAG}" -out=tfplan

      # Persist the plan file if you intend to separate 'plan' and 'apply' 
      # into different jobs. Otherwise, just run apply.
      - run:
          name: Terraform Apply
          working_directory: infrastructure/terraform
          command: terraform apply -auto-approve tfplan            


  migrate:
    docker:
      - image: alpine:latest
    steps:
      - run:
          name: Install Dependencies
          command: apk add --no-cache aws-cli
      - run:
          name: Trigger and Monitor Migration
          command: |
            BUILD_ID=$(aws codebuild start-build \
              --project-name "${APP_NAME}-migration" \
              --source-version "${CIRCLE_BRANCH}" \
              --query 'build.id' \
              --output text)
            
            echo "Started Build ID: $BUILD_ID"

            while true; do
              STATUS=$(aws codebuild batch-get-builds --ids "$BUILD_ID" --query 'builds[0].buildStatus' --output text)
              echo "Status: $STATUS"

              if [ "$STATUS" = "SUCCEEDED" ]; then
                echo "Migration successful!"
                exit 0
              fi

              # Check for failure states using standard case matching
              case "$STATUS" in 
                FAILED|STOPPED|FAULT|TIMED_OUT)
                  echo "Migration failed with status: $STATUS"
                  exit 1
                  ;;
              esac

              sleep 10
            done
  destroy:
    docker:
      - image: hashicorp/terraform:1.14.8
    working_directory: /tmp/workspace/infrastructure/terraform
    steps:
      - checkout:
          path: /tmp/workspace  # Need to checkout to the root
      - run:
          name: Terraform Init
          command: terraform init -input=false

      - run:
          name: Terraform Destroy Plan
          command: |
            terraform plan -destroy -out=destroy_plan
      
      # Optional: Store the plan as an artifact so you can download and read it
      - store_artifacts:
          # Path to the file you want to save
          path: destroy_plan
          # Optional: The folder name it will appear under in the UI
          destination: terraform-plans

      - run:
          name: Terraform Destroy
          # -auto-approve is safe here because the "approval" happens in the UI
          command: terraform destroy -auto-approve
# -----------------------------
# Workflows
# -----------------------------
workflows:
  ci-cd:
    jobs:
      - provision:
          context:
            - terraform
            - aws-credentials

      - migrate:
