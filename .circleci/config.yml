version: 2.1

orbs:
  node: circleci/node@5.2
  aws-ecr: circleci/aws-ecr@9.8.1 
  aws-cli: circleci/aws-cli@5.4.1
  terraform: circleci/terraform@3.5

# -----------------------------
# Reusable commands
# -----------------------------
commands:
  setup-pnpm:
    description: "Install and configure pnpm"
    steps:
      - run:
          name: Install pnpm Package Manager
          command: |
            npm install --global corepack@latest
            corepack enable
            corepack prepare pnpm@latest-10 --activate
            pnpm config set store-dir .pnpm-store

  install-deps:
    description: "Restore pnpm cache, install dependencies, and save cache"
    steps:
      - restore_cache:
          keys:
            - pnpm-packages-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-packages-
      - setup-pnpm
      - run:
          name: Install Dependencies
          command: pnpm install --frozen-lockfile --prefer-offline
      - save_cache:
          key: pnpm-packages-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - .pnpm-store

# -----------------------------
# Jobs
# -----------------------------
jobs:
  lint:
    docker:
      - image: cimg/node:22.14.0
    steps:
      - checkout
      - install-deps
      - run: pnpm biome ci .

  test:
    docker:
      - image: cimg/node:22.14.0
    steps:
      - checkout
      - install-deps
      - run:
          name: Test App
          working_directory: app
          command: pnpm test

  typecheck:
    docker:
      - image: cimg/node:22.14.0
    steps:
      - checkout
      - install-deps
      - run:
          name: Typecheck App
          working_directory: app
          command: pnpm tsc --noEmit

  build:
    docker:
      - image: cimg/node:22.14.0
    steps:
      - checkout
      - install-deps
      - run:
          name: Build App
          working_directory: app
          command: pnpm build
      # 💾 Persist the .output folder so Docker can use it
      - persist_to_workspace:
          root: .
          paths:
            - app/.output
            - Dockerfile  # <--- Crucial: Add this!

# -----------------------------
# Workflows
# -----------------------------
workflows:
  quality-gate-and-deploy:
    jobs:
      # These 4 run in parallel on every push
      - lint
      - test
      - typecheck
      - build

      - aws-ecr/build_and_push_image:
          context: aws-credentials
          auth:
            - aws-cli/setup:
                region: ${AWS_REGION}
          name: deploy-docker
          checkout: false                # Skips the git clone
          region: ${AWS_REGION}         
          repo: ${APP_NAME}              # ECR Repo Name
          create_repo: true
          tag: "latest,${CIRCLE_SHA1}"   # Tags with both for easy tracking
          dockerfile: Dockerfile
          path: .                        # Root where Dockerfile lives
          # 📂 Attach the workspace so the Dockerfile can COPY .output
          attach_workspace: true
          workspace_root: . 
          requires:
            - lint
            - test
            - typecheck
            - build
          # filters:
          #   branches:
          #     only: main

      # 1. Formatting
      - terraform/fmt:
          checkout: true
          requires:
            - aws-ecr/build_and_push_image

      # 2. Validation
      - terraform/validate:
          path: ./infrastructure/terraform
          requires:
            - terraform/fmt
      
      # 3. Plan (Generates the execution plan in HCP Terraform)
      - terraform/plan:
          path: ./infrastructure/terraform
          requires:
            - terraform/validate

      # 4. Manual Gate
      - hold:
          type: approval
          requires:
            - terraform/plan
          # filters:
          #   branches:
          #     only: main

      # 5. Apply (Executes the plan in HCP Terraform)
      - terraform/apply:
          path: ./infrastructure/terraform
          requires:
            - hold
          # filters:
          #   branches:
          #     only: main

      # 6. Safety Gate for Destruction
      - hold-destroy:
          type: approval
          requires:
            - terraform/apply
          # filters:
          #   branches:
          #     only: main

      # 7. Destroy (Executes the destruction in HCP Terraform)
      - terraform/destroy:
          path: ./infrastructure/terraform
          requires:
            - hold-destroy
          # filters:
          #   branches:
          #     only: main