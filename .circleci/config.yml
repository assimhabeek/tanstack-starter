version: 2.1

orbs:
  node: circleci/node@5.2

jobs:
  check-code:
    docker:
      - image: cimg/node:22.14.0
    steps:
      - checkout

      # Restore pnpm cache
      - restore_cache:
          keys:
            - v1-pnpm-deps-{{ checksum "pnpm-lock.yaml" }}
            - v1-pnpm-deps-

      # Install pnpm globally
      - run:
          name: Install pnpm
          command: npm install -g pnpm

      # Install project dependencies with pnpm
      - run:
          name: Install dependencies
          command: pnpm install --frozen-lockfile

      # Save pnpm cache for next builds
      - save_cache:
          paths:
            - ~/.pnpm-store
          key: v1-pnpm-deps-{{ checksum "pnpm-lock.yaml" }}

      # Run Linting (Biome)
      - run:
          name: Linting Check (Biome)
          command: pnpm biome ci .

workflows:
  quality-gate:
    jobs:
      - check-code