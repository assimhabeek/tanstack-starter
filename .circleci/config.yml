version: 2.1

orbs:
  node: circleci/node@5.2
  aws-ecr: circleci/aws-ecr@9.8.1
  aws-cli: circleci/aws-cli@5.4.1


# -----------------------------
# Reusable commands
# -----------------------------
commands:
  setup-pnpm:
    description: "Install and configure pnpm"
    steps:
      - run:
          name: Install pnpm Package Manager
          command: |
            npm install --global corepack@latest
            corepack enable
            corepack prepare pnpm@latest-10 --activate
            pnpm config set store-dir .pnpm-store

  install-deps:
    description: "Restore pnpm cache, install dependencies, and save cache"
    steps:
      - restore_cache:
          keys:
            - pnpm-packages-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-packages-
      - setup-pnpm
      - run:
          name: Install Dependencies
          command: pnpm install --frozen-lockfile --prefer-offline
      - save_cache:
          key: pnpm-packages-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - .pnpm-store

# -----------------------------
# Jobs
# -----------------------------
jobs:
  lint:
    docker:
      - image: cimg/node:22.14.0
    steps:
      - checkout
      - install-deps
      - run: pnpm biome ci .

  test:
    docker:
      - image: cimg/node:22.14.0
    steps:
      - checkout
      - install-deps
      - run:
          name: Test App
          working_directory: app
          command: pnpm test

  typecheck:
    docker:
      - image: cimg/node:22.14.0
    steps:
      - checkout
      - install-deps
      - run:
          name: Typecheck App
          working_directory: app
          command: pnpm tsc --noEmit

  build:
    docker:
      - image: cimg/node:22.14.0
    steps:
      - checkout
      - install-deps
      - run:
          name: Build App
          working_directory: app
          command: pnpm build
      - persist_to_workspace:
          root: .
          paths:
            - app/.output
            - Dockerfile

  deploy:
    docker:
      - image: hashicorp/terraform:1.14.8
    
    # Set the working directory once to avoid 'cd' in every step
    working_directory: /tmp/workspace/infrastructure/terraform

    steps:
      - checkout:
          path: /tmp/workspace  # Need to checkout to the root
      - run:
          name: Terraform Init & Format
          command: |
            terraform fmt -check
            terraform init -input=false

      - run:
          name: Terraform Validate & Plan
          command: |
            terraform validate
            terraform plan -out=tfplan

      # Persist the plan file if you intend to separate 'plan' and 'apply' 
      # into different jobs. Otherwise, just run apply.
      - run:
          name: Terraform Apply
          command: terraform apply -auto-approve tfplan            
  
  destroy:
    docker:
      - image: hashicorp/terraform:1.14.8
    working_directory: /tmp/workspace/infrastructure/terraform
    steps:
      - checkout:
          path: /tmp/workspace  # Need to checkout to the root
      - run:
          name: Terraform Init
          command: terraform init -input=false

      - run:
          name: Terraform Destroy Plan
          command: |
            terraform plan -destroy -out=destroy_plan
      
      # Optional: Store the plan as an artifact so you can download and read it
      - store_artifacts:
          # Path to the file you want to save
          path: destroy_plan
          # Optional: The folder name it will appear under in the UI
          destination: terraform-plans

      - run:
          name: Terraform Destroy
          # -auto-approve is safe here because the "approval" happens in the UI
          command: terraform destroy -auto-approve
# -----------------------------
# Workflows
# -----------------------------
workflows:
  ci-cd:
    jobs:
      # Parallel CI jobs
      - lint
      - test
      - typecheck
      - build

      # Build and push Docker image
      - aws-ecr/build_and_push_image:
          name: dockerize
          auth:
            - aws-cli/setup:
                region: ${AWS_REGION}
          checkout: false
          region: ${AWS_REGION}
          repo: ${APP_NAME}
          create_repo: true 
          tag: "latest,${CIRCLE_SHA1}"
          dockerfile: Dockerfile
          path: .
          attach_workspace: true
          workspace_root: .
          context: aws-credentials
          requires:
            - lint
            - test
            - typecheck
            - build

      # Terraform plan
      - deploy:
          context:
            - terraform
            - aws-credentials
          environment:
            TF_VAR_container_image_tag: ${CIRCLE_SHA1}
          requires:
            - dockerize

      # This creates the "Pause" button in the CircleCI UI
      - request-destroy:
          type: approval
          requires:
            - deploy

      # This job only runs AFTER you click the button above
      - destroy:
          context:
            - terraform
            - aws-credentials
          requires:
            - request-destroy