version: 2.1

orbs:
  node: circleci/node@5.2
  aws-ecr: circleci/aws-ecr@9.8.1
  aws-cli: circleci/aws-cli@5.4.1


# -----------------------------
# Reusable commands
# -----------------------------
commands:
  setup-pnpm:
    description: "Install and configure pnpm"
    steps:
      - run:
          name: Install pnpm Package Manager
          command: |
            npm install --global corepack@latest
            corepack enable
            corepack prepare pnpm@latest-10 --activate
            pnpm config set store-dir .pnpm-store

  install-deps:
    description: "Restore pnpm cache, install dependencies, and save cache"
    steps:
      - restore_cache:
          keys:
            - pnpm-packages-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-packages-
      - setup-pnpm
      - run:
          name: Install Dependencies
          command: pnpm install --frozen-lockfile --prefer-offline
      - save_cache:
          key: pnpm-packages-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - .pnpm-store

# -----------------------------
# Jobs
# -----------------------------
jobs:
  lint:
    docker:
      - image: cimg/node:22.14.0
    steps:
      - checkout
      - install-deps
      - run: pnpm biome ci .

  test:
    docker:
      - image: cimg/node:22.14.0
    steps:
      - checkout
      - install-deps
      - run:
          name: Test App
          working_directory: app
          command: pnpm test

  typecheck:
    docker:
      - image: cimg/node:22.14.0
    steps:
      - checkout
      - install-deps
      - run:
          name: Typecheck App
          working_directory: app
          command: pnpm tsc --noEmit

  build:
    docker:
      - image: cimg/node:22.14.0
    steps:
      - checkout
      - install-deps
      - run:
          name: Build App
          working_directory: app
          command: pnpm build
      - persist_to_workspace:
          root: .
          paths:
            - app/.output
            - Dockerfile

  deploy:
    executor:
      name: terraform/default
      tag: 1.14.8
    steps:      
      - checkout
      # Terraform fmt
      - run:
          name: Terraform fmt
          command: |
            cd ./infrastructure/temp
            terraform fmt -check

      # Terraform init
      - run:
          name: Terraform init
          command: |
            cd ./infrastructure/temp
            terraform init

      # Terraform validate
      - run:
          name: Terraform validate
          command: |
            cd ./infrastructure/temp
            terraform validate

      # Terraform plan
      - run:
          name: Terraform plan
          command: |
            cd ./infrastructure/temp
            terraform plan -out=tfplan

      # Terraform apply
      - run:
          name: Terraform apply
          command: |
            cd ./infrastructure/temp
            terraform apply -auto-approve tfplan
            
