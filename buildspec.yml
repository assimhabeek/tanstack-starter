version: 0.2

phases:
  pre_build:
    commands:
      # 1. Grab the token using the AWS SDK for JavaScript (v3)
      - |
        export GH_TOKEN=$(node -e '
        import { CodeStarConnectionsClient, GetConnectionTokenCommand } from "@aws-sdk/client-codestar-connections";
        const client = new CodeStarConnectionsClient({ region: process.env.AWS_REGION });
        const command = new GetConnectionTokenCommand({ ConnectionArn: process.env.CONNECTION_ARN });
        client.send(command).then(res => console.log(res.connectionToken));
        ' --input-type=module)

      # 2. Authenticate the GitHub CLI
      - echo $GH_TOKEN | gh auth login --with-token